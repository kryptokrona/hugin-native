name: Android Build

on:
  push:
    branches:
      - master
    tags:
      - '*'
  workflow_dispatch:

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Android ${{ github.ref }}
          draft: true
          prerelease: false

  build:
    runs-on: ubuntu-latest
    needs: [create-release]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Force Android linker flags
        run: |
          echo "export LDFLAGS=\"-Wl,-z,max-page-size=16384\"" >> $GITHUB_ENV
          echo "export CFLAGS=\"\"" >> $GITHUB_ENV
          echo "export CXXFLAGS=\"\"" >> $GITHUB_ENV
          echo "export GYP_DEFINES=\"android_max_page_size=16384\"" >> $GITHUB_ENV

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 📦 Install dependencies
        run: |
          export LDFLAGS="-Wl,-z,max-page-size=16384"
          npm install

      - name: 🐛 Debug check packages
        run: npm ls

      - name: 🩹 Patch NPM packages
        run: npm run patch

      - name: 📋 Get offline lists
        run: npm run get-offline-lists

      - name: 🔑 Export private keys file
        run: npm run create-private-keys

      - name: 📦 Bundle bare
        run: ./bin/bundle.js -ra

      - name: 🔐 Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.keystore

      - name: 🔐 Export signing vars
        run: |
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Restore google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: 🛠️ Build Release APK & AAB
        run: |
          export LDFLAGS="-Wl,-z,max-page-size=16384"
          cd android
          ./gradlew clean
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: 📤 Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: 📦 Upload APK to Release
        uses: actions/upload-release-asset@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: android/app/build/outputs/apk/release/app-release.apk
          asset_name: hugin-messenger-${{ github.ref_name }}.apk
          asset_content_type: application/vnd.android.package-archive
